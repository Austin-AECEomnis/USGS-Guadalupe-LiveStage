html<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 12px;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #ffffff;
    }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .stage {
      font-size: 36px;
      font-weight: bold;
      line-height: 1;
    }
    .unit {
      font-size: 14px;
      opacity: 0.75;
    }
    .site {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 6px;
    }
    .updated {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="label">Guadalupe River Stage</div>
  <div class="stage"><span id="stage">Loading...</span> <span class="unit"></span></div>
  <div class="site" id="site"></div>
  <div class="updated">Updated: <span id="timestamp"></span></div>

  <script>
    var url = 'https://austin-aeceomnis.github.io/USGS-Guadalupe-LiveStage/current_stage.json';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        var data = JSON.parse(xhr.responseText);
        document.getElementById('stage').textContent = data.stage_ft + ' ft';
        document.getElementById('site').textContent = data.site;
        document.getElementById('timestamp').textContent = data.timestamp;
      } else {
        document.getElementById('stage').textContent = 'Error ' + xhr.status;
      }
    };
    xhr.onerror = function() {
      document.getElementById('stage').textContent = 'Network error';
    };
    xhr.send();
  </script>
</body>
</html>
