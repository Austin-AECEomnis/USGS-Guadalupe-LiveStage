<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3600">
  <title>Guadalupe River Stage</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #ffffff;
    }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .stage {
      font-size: 36px;
      font-weight: bold;
      line-height: 1;
    }
    .status {
      display: inline-block;
      font-size: 12px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 6px;
    }
    .normal { background-color: #2e7d32; color: #ffffff; }
    .elevated { background-color: #f9a825; color: #000000; }
    .flood { background-color: #c62828; color: #ffffff; }
    .site {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 8px;
    }
    .source {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 2px;
    }
    .updated {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="label">Guadalupe River Stage</div>
  <div class="stage"><span id="stage">Loading...</span></div>
  <div id="status-badge"></div>
  <div class="site" id="site"></div>
  <div class="source">USGS Site No. 08165500 &nbsp;|&nbsp; USGS Water Data for the Nation</div>
  <div class="updated">Updated: <span id="timestamp"></span></div>

  <script>
    var url = 'https://austin-aeceomnis.github.io/USGS-Guadalupe-LiveStage/current_stage.json';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        var data = JSON.parse(xhr.responseText);
        var ft = parseFloat(data.stage_ft);

        document.getElementById('stage').textContent = data.stage_ft + ' ft';
        document.getElementById('site').textContent = data.site;
        document.getElementById('timestamp').textContent = data.timestamp;

        var badge = document.getElementById('status-badge');
        if (ft >= 15) {
          badge.innerHTML = '<span class="status flood">&#9888; Flood Stage</span>';
        } else if (ft >= 10) {
          badge.innerHTML = '<span class="status elevated">&#9650; Elevated</span>';
        } else {
          badge.innerHTML = '<span class="status normal">&#10003; Normal</span>';
        }
      } else {
        document.getElementById('stage').textContent = 'Error ' + xhr.status;
      }
    };
    xhr.onerror = function() {
      document.getElementById('stage').textContent = 'Network error';
    };
    xhr.send();
  </script>
</body>
</html>
